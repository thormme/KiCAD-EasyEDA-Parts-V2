name: KiCAD PCM packaging

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  create_archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get release tag
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create archive
        run: |
          chmod +x ./PCM/create_pcm_archive.sh
          ./PCM/create_pcm_archive.sh ${{ steps.tag.outputs.TAG }}

      - name: Compute SHA256 and size
        id: meta
        run: |
          FILE=./PCM/KiCAD-PCM-${{ steps.tag.outputs.TAG }}.zip

          SHA=$(sha256sum $FILE | awk '{print $1}')
          SIZE=$(stat -c%s $FILE)

          echo "SHA256=$SHA" >> $GITHUB_OUTPUT
          echo "SIZE=$SIZE" >> $GITHUB_OUTPUT

      - name: Upload zip as release asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./PCM/KiCAD-PCM-${{ steps.tag.outputs.TAG }}.zip
          asset_name: KiCAD-PCM-${{ steps.tag.outputs.TAG }}.zip
          overwrite: true
          tag: ${{ steps.tag.outputs.TAG }}

      - name: Trigger repository rebuild
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Rebuild repository
          ref: refs/heads/master
          repo: KoenLammers/Yanndroid-KiCAD-Repository
          token: ${{ secrets.PERSONAL_TOKEN }}
          inputs: |
            {
              "VERSION": "${{ steps.tag.outputs.TAG }}",
              "DOWNLOAD_SHA256": "${{ steps.meta.outputs.SHA256 }}",
              "DOWNLOAD_SIZE": "${{ steps.meta.outputs.SIZE }}",
              "DOWNLOAD_URL": "https://github.com/KoenLammers/KiCAD-EasyEDA-Parts-V2/releases/download/${{ steps.tag.outputs.TAG }}/KiCAD-PCM-${{ steps.tag.outputs.TAG }}.zip"
            }