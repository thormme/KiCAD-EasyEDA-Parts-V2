name: KiCAD PCM packaging

permissions:
  contents: write

on:
  release:
    types: [published]

jobs:
  create_archive:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create archive
        run: |
          TAG="${{ github.event.release.tag_name }}"
          chmod +x ./PCM/create_pcm_archive.sh
          ./PCM/create_pcm_archive.sh "$TAG"

      - name: Upload release asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.PERSONAL_TOKEN }}
          file: ./PCM/KiCAD-PCM-${{ github.event.release.tag_name }}.zip
          asset_name: KiCAD-PCM-${{ github.event.release.tag_name }}.zip
          overwrite: true
          tag: ${{ github.event.release.tag_name }}