name: KiCAD PCM packaging

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug context
        run: |
          echo "event=${{ github.event_name }}"
          echo "tag=${{ github.event.release.tag_name }}"
          echo "pwd=$(pwd)"
          ls -R PCM

      - name: Build archive
        run: |
          chmod +x ./PCM/create_pcm_archive.sh
          ./PCM/create_pcm_archive.sh "${{ github.event.release.tag_name }}"

      - name: Verify output
        run: |
          FILE="./PCM/KiCAD-PCM-${{ github.event.release.tag_name }}.zip"

          echo "Checking $FILE"
          ls -lh PCM

          if [[ ! -f "$FILE" ]]; then
            echo "❌ ZIP missing"
            exit 1
          fi

          sha256sum "$FILE"
          unzip -l "$FILE"

      - name: Upload release asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.PERSONAL_TOKEN }}
          file: ./PCM/KiCAD-PCM-${{ github.event.release.tag_name }}.zip
          asset_name: KiCAD-PCM-${{ github.event.release.tag_name }}.zip
          tag: ${{ github.event.release.tag_name }}
          overwrite: true