name: Cleanup Workflow Runs

on:
  schedule:
    - cron: '0 0 * * 0' # every Sunday

jobs:
  delete_runs:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2.1.0
        with:
          token: ${{ secrets.PERSONAL_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 5